name: Deploy to o2switch

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASS: ${{ secrets.DB_PASS }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_USER: ${{ secrets.FTP_USER }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v5

      - name: Générer api/config.php depuis les secrets GitHub
        run: |
          cat > api/config.php <<PHP
          <?php
          define('DB_HOST',         '${DB_HOST}');
          define('DB_PORT',         '${DB_PORT}');
          define('DB_NAME',         '${DB_NAME}');
          define('DB_USER',         '${DB_USER}');
          define('DB_PASS',         '${DB_PASS}');
          define('ADMIN_USERNAME',  '${ADMIN_USERNAME}');
          define('ADMIN_PASSWORD',  '${ADMIN_PASSWORD}');
          PHP

      - name: Installer lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Déployer par FTP vers o2switch
        run: |
          lftp -e "
          set ssl:verify-certificate no;
          open ${FTP_HOST};
          user ${FTP_USER} ${FTP_PASSWORD};
          mirror -R ./ ${FTP_SERVER_DIR} \
            --verbose \
            --delete \
            --exclude-glob .git* \
            --exclude-glob .github \
            --exclude-glob README.md;
          bye
          "
